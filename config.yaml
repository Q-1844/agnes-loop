# AgnesLoop Configuration
# API Key should be set via environment variable AGNES_API_KEY

llm:
  provider: openai-compatible
  base_url: "https://apihub.agnes-ai.com/v1"  # Agnes 2.0 Flash endpoint
  model: "agnes-2.0-flash"
  max_tokens: 4096
  temperature: 0.7
  enable_thinking: true  # Enable thinking mode for better agent performance
  # API Key: set via AGNES_API_KEY env var

time:
  soft_limit_minutes: 170        # 2小时50分
  emergency_limit_minutes: 175   # 2小时55分
  periodic_save_minutes: 15      # 每15分钟保存
  github_hard_limit_minutes: 180 # GitHub Actions 强制 kill

review:
  max_retries: 3
  auto_fix_enabled: true

git:
  auto_commit: true
  commit_user_name: "AgnesLoop Bot"
  commit_user_email: "bot@agnesloop.local"
